<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lojas Nacional</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="icon" href="../assets/images/favicon/favicon.ico" type="image/x-icon">
</head>
<body>

  <header class="header">
    <div class="headerTopo">
      <div class="infoHeader">
        <p>🚚 Frete grátis para todo o Brasil | 💳 Até 12x sem juros | 🔒 Compra segura</p>
      </div>
      <div class="linksHeaderTopo">
        <a href="../index.html">Voltar à loja</a>
      </div>
    </div>
    <div class="headerMain" style="justify-content: center;">
      <a href="../index.html">
        <img src="../assets/images/Logo_FundoTransp.png" alt="Lojas Nacional" class="logo">
      </a>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-wrapper">
      <div class="auth-card">

        <div class="auth-tab-bar">
          <a href="login.html" class="auth-tab active">Entrar</a>
          <a href="cadastro.html" class="auth-tab">Criar Conta</a>
        </div>

        <h1 class="auth-title">Bem-vindo de volta!</h1>
        <p class="auth-sub">Acesse sua conta para continuar comprando.</p>

        <form class="auth-form" action="#" method="POST">
          <div class="auth-field">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required>
          </div>
          <div class="auth-field">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="••••••••" required>
          </div>
          <a href="#" class="auth-forgot">Esqueci minha senha</a>
          <button type="submit" class="auth-btn-primary">Entrar na minha conta</button>
        </form>

        <div class="auth-divider">
          <span class="auth-divider-line"></span>
          <span class="auth-divider-text">ou</span>
          <span class="auth-divider-line"></span>
        </div>

        <button class="auth-btn-google" type="button">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.8 0 7 5.5 3.2 13.5l7.8 6C12.8 13.5 17.9 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
            <path fill="#FBBC05" d="M11 28.5c-.5-1.5-.8-3.1-.8-4.8s.3-3.3.8-4.8l-7.8-6C1.2 16 0 19.9 0 24s1.2 8 3.2 11.1l7.8-6z"/>
            <path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.5-5.8c-2.1 1.4-4.8 2.3-8 2.3-6.1 0-11.2-4-13-9.5l-7.8 6C7 42.5 14.8 48 24 48z"/>
          </svg>
          Continuar com Google
        </button>

        <p class="auth-switch">Não tem conta? <a href="cadastro.html">Criar agora</a></p>

      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 Lojas Nacional</p>
  </footer>

</body>
</html>
